[vault]
project = "ctxvault"
root = ".ctxvault"

[storage]
objects_dir = "objects"
indexes_dir = "indexes"
reviews_dir = "reviews"
exports_dir = "exports"
sqlite_path = "indexes/ctxvault.sqlite3"

[policy]
default_policy_fixture = "fixtures/controls/protection-policy.json"
backup_receipt_path = ""
require_human_review = true
require_backup_for_durable_writes = true

[adapters]
mode = "disabled"
allow_remote = false
