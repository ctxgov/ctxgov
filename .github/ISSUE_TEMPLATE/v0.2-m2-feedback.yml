name: v0.2/M2 developer-framework feedback
description: Share feedback on the v0.2/M2 healthchecks, runtime receipts, review ergonomics, or local backup wording.
title: "[v0.2/M2 Feedback] "
labels:
  - workflow
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for concrete v0.2/M2 feedback after trying the README, projection healthchecks, runtime receipts, or optional local backup write path. Please prefer one real workflow or integration concern over a broad wishlist.
  - type: dropdown
    id: reviewer_profile
    attributes:
      label: Which profile best matches you?
      options:
        - ai-coding-power-user
        - oss-maintainer
        - adapter-builder
        - local-first-privacy-builder
        - commercial-software-power-user
        - open-source-curious-first-timer
        - other
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Feedback area
      options:
        - v0.2 positioning or README
        - projection healthcheck
        - runtime receipt
        - review queue or review ergonomics
        - local backup wording or behavior
        - CLI or MCP surface
        - adapter or integration request
        - trust or privacy boundary
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What did you try?
      description: Name the command, doc section, target surface, fixture, or workflow you touched.
      placeholder: PYTHONPATH=src python3 -m ctxvault.cli adapter-healthcheck --root /tmp/ctxvault-clean-verify --target-kind agents-md --target-path exports/AGENTS.md
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: What was unclear, broken, or missing?
      description: Describe the concrete confusion, failure, trust concern, or missing integration detail.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What would have made this easier?
      description: Suggest the smallest correction that would improve the developer-framework path.
    validations:
      required: false
