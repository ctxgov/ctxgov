name: v0.4.0 first 10 minutes trial report
description: Record the first 10 minutes of a v0.4.0 trial without mixing it with general feedback.
title: "[v0.4.0 First 10 Minutes] "
labels:
  - workflow
  - needs-triage
  - first-10-minutes
body:
  - type: markdown
    attributes:
      value: |
        Use this for a first 10 minutes trial report. This can be self-reported or observer-assisted, but it is not counted as a non-author controlled trial unless it follows the separate controlled-trial template and records facilitator notes. Do not paste secrets, private source text, raw logs, or unredacted screenshots.
  - type: dropdown
    id: author_relationship
    attributes:
      label: Relationship to the project
      description: This separates author/operator feedback from real non-author trial evidence.
      options:
        - non-author, first-time user
        - non-author, has heard about the project
        - maintainer or author
        - contributor familiar with internals
        - other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, hardware, and install surface
      placeholder: macOS 15.x, Apple Silicon, GitHub release zip / Mac App Alpha / source checkout
    validations:
      required: true
  - type: dropdown
    id: entrypoint
    attributes:
      label: First entrypoint
      options:
        - GitHub README
        - GitHub Release page
        - notarized Mac App Alpha artifact
        - Receipt/Trust Gallery
        - Show HN or social post
        - direct recommendation
        - other
    validations:
      required: true
  - type: checkboxes
    id: completed_steps
    attributes:
      label: What happened within the first 10 minutes?
      options:
        - label: Found the release or quick-start entrypoint
        - label: Installed or started the app/core path
        - label: Seeded or opened demo data
        - label: Ran preview plan or equivalent dry run
        - label: Generated or inspected a receipt
        - label: Opened the Receipt/Trust Gallery
        - label: Understood what was selected, blocked, written, and not done
        - label: Exported or understood the local feedback bundle
  - type: dropdown
    id: first_blocker
    attributes:
      label: First blocker or hesitation point
      options:
        - none, reached useful moment
        - install or download
        - Gatekeeper or notarization trust
        - permissions or file access
        - demo seed or reset
        - preview plan
        - receipt meaning
        - Workstream meaning
        - selected/blocked/written explanation
        - feedback bundle
        - other
    validations:
      required: true
  - type: input
    id: time_to_useful_moment
    attributes:
      label: Time to first useful moment
      placeholder: e.g. 3m20s, did not reach, or unknown
    validations:
      required: true
  - type: textarea
    id: comprehension
    attributes:
      label: What could the user explain after 10 minutes?
      description: Include whether receipt, Workstream, privacy boundary, and next action were understood.
      placeholder: "Receipt: understood / unclear. Workstream: unclear. Privacy boundary: understood no provider call and no runtime control."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Share sanitized receipt filename, feedback-bundle basename, checksum, command name, or short non-secret output.
    validations:
      required: false
  - type: textarea
    id: smallest_fix
    attributes:
      label: Smallest fix that would improve the first 10 minutes
    validations:
      required: false
