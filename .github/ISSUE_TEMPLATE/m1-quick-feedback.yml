name: M1 quick feedback
description: Share first-run feedback on Context Injection M1 with minimal ceremony.
title: "[M1 Feedback] "
labels:
  - workflow
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this for fast Context Injection M1 feedback after trying the README, deterministic checks, or source-to-injection golden path. Concrete friction is more useful than broad roadmap requests.
  - type: dropdown
    id: reviewer_profile
    attributes:
      label: Which profile best matches you?
      options:
        - ai-coding-power-user
        - oss-maintainer
        - local-first-privacy-builder
        - commercial-software-power-user
        - open-source-curious-first-timer
        - other
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What did you try?
      description: Name the command, README section, fixture, projection, or workflow you touched.
      placeholder: python3 scripts/run_context_injection_m1_golden_path.py --root /tmp/ctxvault-m1-context-injection
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Where did it break or become unclear?
      description: Describe the first concrete point of confusion, missing context, or workflow friction.
    validations:
      required: true
  - type: dropdown
    id: feedback_bucket
    attributes:
      label: Feedback bucket
      options:
        - README or positioning
        - Quick start or install
        - Context Injection M1 clarity
        - Workstream or object model
        - Review and receipt trust
        - Projection target
        - Integration request
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What would have made this easier?
      description: Suggest the smallest correction that would have improved your first pass.
    validations:
      required: false
