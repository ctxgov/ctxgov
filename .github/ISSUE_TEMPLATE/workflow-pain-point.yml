name: Workflow pain point
description: Report friction in the CLI, review loop, workbench, or real task flow.
title: "[Workflow] "
labels:
  - workflow
body:
  - type: markdown
    attributes:
      value: |
        Use this template for real task friction. Please prefer one concrete workflow break over a broad wish list.
  - type: textarea
    id: task
    attributes:
      label: Task you were trying to do
      description: Describe the real workflow or workstream.
    validations:
      required: true
  - type: textarea
    id: friction
    attributes:
      label: Where the flow broke down
      description: What step created confusion, extra work, or weak context continuity?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP
        - Workbench
        - Native wrapper
        - Docs
        - Import or export flow
    validations:
      required: true
  - type: input
    id: artifact
    attributes:
      label: Command, path, or screen
      placeholder: python3 -m ctxgov.cli build-context ...
    validations:
      required: false
