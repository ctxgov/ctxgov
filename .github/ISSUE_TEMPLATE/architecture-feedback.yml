name: Architecture feedback
description: Report a problem or confusion in the core architecture, object model, or contracts.
title: "[Architecture] "
labels:
  - architecture
body:
  - type: markdown
    attributes:
      value: |
        Use this template for feedback about the canonical model, workstream semantics, review flow, plugin model, or other architectural contracts.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One clear sentence describing the issue.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Object model
        - Workstream model
        - Review and promotion
        - Policy and trust
        - Plugin architecture
        - Adapter and projection design
        - Public contract or docs
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: What feels wrong now
      description: Describe the confusing or weak part of the current design.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it matters
      description: Explain why this matters for trust, comprehension, extensibility, or adoption.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction
      description: If you have a concrete suggestion, describe it here.
    validations:
      required: false
  - type: input
    id: artifact
    attributes:
      label: Affected artifact
      description: File path, command, or doc section if applicable.
      placeholder: docs/public-positioning.md
    validations:
      required: false
