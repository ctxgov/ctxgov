name: Trust or privacy concern
description: Report a trust-surface, privacy, policy, or export-control problem.
title: "[Trust] "
labels:
  - trust
  - privacy
body:
  - type: markdown
    attributes:
      value: |
        Use this template when the issue affects inspectability, privacy, policy clarity, review guarantees, or export safety.
  - type: textarea
    id: summary
    attributes:
      label: Concern summary
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: File path, command, reproduction, or trust-surface mismatch.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Why it matters
      description: Explain the trust, privacy, or governance risk.
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Recommended correction
    validations:
      required: false
