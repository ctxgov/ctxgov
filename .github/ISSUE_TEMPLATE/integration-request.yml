name: Integration request
description: Request a plugin, projection target, adapter, or ingest path.
title: "[Integration] "
labels:
  - integration
body:
  - type: markdown
    attributes:
      value: |
        Use this template for adapter, plugin, projection, or import/export requests.
  - type: dropdown
    id: kind
    attributes:
      label: Request type
      options:
        - Harness adapter
        - Projection target
        - Ingest source
        - Analyzer plugin
        - Transformer plugin
        - Action plugin
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Target tool or system
      placeholder: Claude Code, Cursor, AGENTS.md, Obsidian, portable .agent tree
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem would this integration solve?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why this should be prioritized
      description: Explain the expected adoption or workflow value.
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: Expected output or behavior
      description: Describe what success looks like.
    validations:
      required: false
